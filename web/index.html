<!doctype html>
<html lang="zh">
<head>

<title>rustpal — 仙劍奇俠傳</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    color: #ccc;
    font: 14px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

    width: min(96vw, calc(96vh * 1.6), 960px);

  #keys { color: #777; font-size: 12px; }

<canvas id="screen" width="320" height="200"></canvas>

<div id="keys">方向鍵 移動 · 空格/回車 確認 · Esc 菜單 · 戰鬥: R 連擊 A 自動 D 防禦 E 物品 W 投擲 Q 逃跑 F 仙術 S 狀態</div>

</html>
